version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════════
  # DATENBANKEN
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nkcheck}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nkcheck_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nkcheck}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nkcheck}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ═══════════════════════════════════════════════════════════════
  # DATEN-AUFBEREITUNG (big-pdf-data-chunker)
  # ═══════════════════════════════════════════════════════════════
  chunker-web:
    build:
      context: ./chunker
      dockerfile: Dockerfile
    ports:
      - "${CHUNKER_PORT:-5000}:5000"
    environment:
      OLLAMA_HOST: ${LLM_CHUNKER_HOST:-http://localhost:11434}
      OLLAMA_MODEL: ${LLM_CHUNKER_MODEL:-qwen2.5:14b}
      UPLOAD_FOLDER: /data/uploads
      OUTPUT_FOLDER: /data/output
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
    volumes:
      - uploads_data:/data/uploads
      - chunks_data:/data/output
    depends_on:
      redis:
        condition: service_healthy

  chunker-worker:
    build:
      context: ./chunker
      dockerfile: Dockerfile
    command: rq worker --url redis://redis:6379
    environment:
      OLLAMA_HOST: ${LLM_CHUNKER_HOST:-http://localhost:11434}
      OLLAMA_MODEL: ${LLM_CHUNKER_MODEL:-qwen2.5:14b}
      UPLOAD_FOLDER: /data/uploads
      OUTPUT_FOLDER: /data/output
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/data/uploads
      - chunks_data:/data/output
    depends_on:
      redis:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════
  # WEFT BACKEND
  # ═══════════════════════════════════════════════════════════════
  restate:
    image: restatedev/restate:latest
    ports:
      - "${RESTATE_PORT:-8080}:8080"
      - "${RESTATE_ADMIN_PORT:-9070}:9070"
    environment:
      RESTATE_AUTO_PROVISION: "true"
    volumes:
      - restate_data:/var/lib/restate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9070"]
      interval: 10s
      retries: 5

  weft-orchestrator:
    build:
      context: .
      dockerfile: docker/weft.Dockerfile
      target: orchestrator
    ports:
      - "${WEFT_ORCHESTRATOR_PORT:-9080}:9080"
    environment:
      RESTATE_URL: http://restate:${RESTATE_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-nkcheck}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-nkcheck}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
    depends_on:
      postgres:
        condition: service_healthy
      restate:
        condition: service_healthy

  weft-api:
    build:
      context: .
      dockerfile: docker/weft.Dockerfile
      target: api
    ports:
      - "${WEFT_API_PORT:-3000}:3000"
    environment:
      RESTATE_URL: http://restate:${RESTATE_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-nkcheck}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-nkcheck}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
      EXECUTOR_URL: http://restate:${RESTATE_PORT:-8080}
      DASHBOARD_URL: http://operator-ui:${OPERATOR_UI_PORT:-5174}
    depends_on:
      postgres:
        condition: service_healthy
      restate:
        condition: service_healthy

  weft-node-runner:
    build:
      context: .
      dockerfile: docker/weft.Dockerfile
      target: node-runner
    ports:
      - "${WEFT_NODE_RUNNER_PORT:-9082}:9082"
    environment:
      ORCHESTRATOR_URL: http://restate:${RESTATE_PORT:-8080}
      NODE_PORT: ${WEFT_NODE_RUNNER_PORT:-9082}
      NODE_ID: nkcheck-node-runner
      LLM_API_URL: ${LLM_HOST:-http://host.docker.internal:8000}
      API_URL: http://weft-api:${WEFT_API_PORT:-3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      restate:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════
  # LLM ENGINE (vLLM)
  # ═══════════════════════════════════════════════════════════════
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      HF_HOME: /models
    volumes:
      - model_cache:/models
    command: >
      --model ${LLM_MODEL_PATH:-Qwen/Qwen2.5-32B-Instruct-AWQ}
      --host 0.0.0.0
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - gpu

  # ═══════════════════════════════════════════════════════════════
  # FRONTENDS
  # ═══════════════════════════════════════════════════════════════
  operator-ui:
    build:
      context: ./operator-ui
      dockerfile: Dockerfile
    ports:
      - "${OPERATOR_UI_PORT:-5174}:5174"
    environment:
      WEFT_API_URL: http://weft-api:${WEFT_API_PORT:-3000}
    depends_on:
      weft-api:
        condition: service_started

  # ── Development: Weft Dashboard (Web UI fuer Projekte) ──
  weft-dashboard:
    build:
      context: ./weft
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    environment:
      API_URL: http://weft-api:${WEFT_API_PORT:-3000}
    depends_on:
      weft-api:
        condition: service_started
    profiles:
      - full

volumes:
  pgdata:
  restate_data:
  uploads_data:
  chunks_data:
  model_cache:
